{% set name = "pyobjc-core" %}
{% set version = "12.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 2bb3903f5387f72422145e1466b3ac3f7f0ef2e9960afa9bcd8961c5cbf8bd21

build:
  number: 0
  skip: true  # [not osx or py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - wheel
    - setuptools
    - libffi {{ libffi }}
  run:
    - python
    - libffi {{ libffi }}

test:
  imports:
    - objc
  requires:
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

    # Run test without copying test-files to destination artifact
    - ROOT="$(dirname "$SRC_DIR")"
    - SRC_REAL="$(ls -d "$ROOT"/work_moved* 2>/dev/null | head -n1)"
    - test -n "$SRC_REAL"
    - export PYTHONPATH="$SRC_REAL"
    - pushd "$SRC_REAL"
    - python Tools/runtests.py
    - popd

about:
  home: https://github.com/ronaldoussoren/pyobjc
  license: MIT
  summary: Python<->ObjC Interoperability Module
  description: |
    The PyObjC package provides the glue needed to interface the Python interpreter
    with the Objective-C language. At its core is the `objc` module makes
    Objective-C objects and classes available as first-class Python citizens. It is
    not only possible to use Objective-C objects but you can also subclass
    Objective-C classes.
  license_family: MIT
  license_file: License.txt
  dev_url: https://github.com/ronaldoussoren/pyobjc/tree/master/pyobjc-core
  doc_url: https://github.com/ronaldoussoren/pyobjc/blob/master/pyobjc-core/README.txt

extra:
  recipe-maintainers:
    - kastman
