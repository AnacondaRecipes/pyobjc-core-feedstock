{% set name = "pyobjc-core" %}
{% set version = "8.0" %}
{% set sha256 = "4cd0735cdb7a7b959def0fe1769df74e0ab6de5ea1ca40f1464d2ac78b85326f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:                # [osx and arm64]
    - fix_ffi_fcfc.patch  # [osx and arm64]

build:
  number: 0
  skip: true  # # [not osx or py2k or (arm64 and py < 38)]
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - python
    - libffi
  host:
    - python
    - pip
    - wheel
    - setuptools
    - libffi
  run:
    - python
    - libffi
    - setuptools

test:
  imports:
    - PyObjCTools
    - objc
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/ronaldoussoren/pyobjc
  license: MIT
  summary: 'Python<->ObjC Interoperability Module'
  license_family: MIT
  license_file: License.txt
  dev_url: https://github.com/ronaldoussoren/pyobjc/tree/master/pyobjc-core
  doc_url: https://github.com/ronaldoussoren/pyobjc/blob/master/pyobjc-core/README.txt

extra:
  recipe-maintainers:
    - kastman
